# Build Decky plugin(s) and produce installable zip(s).
# Matches the official SteamDeckHomebrew/decky-plugin-database builder:
#   pnpm i --frozen-lockfile → pnpm run build → package (exclude src, node_modules, __pycache__).
# Zip filename uses plugin.json "name" so the store/loader can install correctly.

name: Build Plugin Zip

on:
  push:
    branches: [main]
    paths: ['plugins/**', '.github/workflows/build-plugin.yml']
  pull_request:
    branches: [main]
    paths: ['plugins/**', '.github/workflows/build-plugin.yml']
  workflow_dispatch:
    inputs:
      plugin_name:
        description: 'Optional: plugin folder name under plugins/ to build (e.g. zipline-auto-uploader). Leave empty to build all changed plugins.'
        required: false
        type: string

env:
  PLUGIN_ROOT: plugins
  # Use Node 24 for running GitHub Actions (checkout, etc.); avoids Node 20 deprecation warning.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  find-plugins:
    name: Find plugins to build
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.set-plugins.outputs.plugins }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set plugins to build
        id: set-plugins
        run: |
          OVERRIDE="${{ inputs.plugin_name }}"
          if [ -n "$OVERRIDE" ]; then
            echo "plugins=[\"$OVERRIDE\"]" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ ! -d "${{ env.PLUGIN_ROOT }}" ]; then
            echo "plugins=[]" >> $GITHUB_OUTPUT
            exit 0
          fi
          PLUGINS=$(find "${{ env.PLUGIN_ROOT }}" -mindepth 1 -maxdepth 1 -type d -exec basename {} \;)
          if [ -z "$PLUGINS" ]; then
            echo "plugins=[]" >> $GITHUB_OUTPUT
          else
            JSON="[$(echo "$PLUGINS" | sed 's/.*/"&"/' | paste -sd,)]"
            echo "plugins=$JSON" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build ${{ matrix.plugin }}
    needs: find-plugins
    if: ${{ needs.find-plugins.outputs.plugins != '[]' && needs.find-plugins.outputs.plugins != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.find-plugins.outputs.plugins) }}
    defaults:
      run:
        working-directory: ${{ env.PLUGIN_ROOT }}/${{ matrix.plugin }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ${{ env.PLUGIN_ROOT }}/${{ matrix.plugin }}/pnpm-lock.yaml

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm i --frozen-lockfile
          else
            pnpm i
          fi

      - name: Build
        run: pnpm run build

      - name: Get plugin name for zip
        id: zipname
        run: |
          NAME=$(jq -r '.name' plugin.json)
          if [ -z "$NAME" ] || [ "$NAME" = "null" ]; then
            NAME="${{ matrix.plugin }}"
          fi
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Create plugin zip
        run: |
          # Same exclusions as official builder (src, node_modules, __pycache__)
          ZIP_NAME="${{ steps.zipname.outputs.name }}.zip"
          zip -r "${{ github.workspace }}/$ZIP_NAME" . \
            -x "src/*" \
            -x "node_modules/*" \
            -x "__pycache__/*" \
            -x ".git/*" \
            -x "*.zip" \
            -x ".github/*" \
            -x ".vscode/*" \
            -x "*.map"
          cp "${{ github.workspace }}/$ZIP_NAME" "${{ github.workspace }}/${{ matrix.plugin }}.zip"

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.plugin }}
          path: ${{ github.workspace }}/${{ matrix.plugin }}.zip

  release:
    name: Release ${{ matrix.plugin }}
    needs: [find-plugins, build]
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') &&
      needs.find-plugins.outputs.plugins != '[]' &&
      needs.find-plugins.outputs.plugins != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.find-plugins.outputs.plugins) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Get plugin repo (owner/repo)
        id: repo
        run: |
          cd "${{ env.PLUGIN_ROOT }}/${{ matrix.plugin }}"
          URL=$(git remote get-url origin 2>/dev/null || true)
          if [ -z "$URL" ]; then
            echo "Could not get submodule remote URL" >&2
            exit 1
          fi
          # Parse https://github.com/owner/repo.git or git@github.com:owner/repo.git -> owner/repo
          REPO=$(echo "$URL" | sed -E 's|^https://github\.com/||; s|^git@github\.com:||; s|\.git$||')
          echo "repository=$REPO" >> $GITHUB_OUTPUT

      - name: Get plugin version
        id: version
        run: |
          V=$(jq -r '.version' "${{ env.PLUGIN_ROOT }}/${{ matrix.plugin }}/package.json")
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "tag=v$V" >> $GITHUB_OUTPUT

      - name: Download plugin zip
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.plugin }}

      - name: Create GitHub Release in plugin repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ steps.repo.outputs.repository }}
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: ${{ matrix.plugin }}.zip
          generate_release_notes: true
