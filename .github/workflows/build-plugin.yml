# Build Decky plugin(s) and produce installable zip(s).
# Matches the official SteamDeckHomebrew/decky-plugin-database builder:
#   pnpm i --frozen-lockfile → pnpm run build → package (exclude src, node_modules, __pycache__).
# Zip filename uses plugin.json "name" so the store/loader can install correctly.

name: Build Plugin Zip

on:
  push:
    branches: [main]
    paths: ['plugins/**', '.github/workflows/build-plugin.yml']
  pull_request:
    branches: [main]
    paths: ['plugins/**', '.github/workflows/build-plugin.yml']
  workflow_dispatch:
    inputs:
      plugin_name:
        description: 'Optional: plugin folder name under plugins/ to build (e.g. zipline-auto-uploader). Leave empty to build all changed plugins.'
        required: false
        type: string

env:
  PLUGIN_ROOT: plugins

jobs:
  find-plugins:
    name: Find plugins to build
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.set-plugins.outputs.plugins }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set plugins to build
        id: set-plugins
        run: |
          OVERRIDE="${{ inputs.plugin_name }}"
          if [ -n "$OVERRIDE" ]; then
            echo "plugins=[\"$OVERRIDE\"]" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ ! -d "${{ env.PLUGIN_ROOT }}" ]; then
            echo "plugins=[]" >> $GITHUB_OUTPUT
            exit 0
          fi
          PLUGINS=$(find "${{ env.PLUGIN_ROOT }}" -mindepth 1 -maxdepth 1 -type d -exec basename {} \;)
          if [ -z "$PLUGINS" ]; then
            echo "plugins=[]" >> $GITHUB_OUTPUT
          else
            JSON="[$(echo "$PLUGINS" | sed 's/.*/"&"/' | paste -sd,)]"
            echo "plugins=$JSON" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build ${{ matrix.plugin }}
    needs: find-plugins
    if: ${{ needs.find-plugins.outputs.plugins != '[]' && needs.find-plugins.outputs.plugins != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.find-plugins.outputs.plugins) }}
    defaults:
      run:
        working-directory: ${{ env.PLUGIN_ROOT }}/${{ matrix.plugin }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ${{ env.PLUGIN_ROOT }}/${{ matrix.plugin }}/pnpm-lock.yaml

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@9 --activate

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm i --frozen-lockfile
          else
            pnpm i
          fi

      - name: Build
        run: pnpm run build

      - name: Get plugin name for zip
        id: zipname
        run: |
          NAME=$(jq -r '.name' plugin.json)
          if [ -z "$NAME" ] || [ "$NAME" = "null" ]; then
            NAME="${{ matrix.plugin }}"
          fi
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - name: Create plugin zip
        run: |
          # Same exclusions as official builder (src, node_modules, __pycache__)
          ZIP_NAME="${{ steps.zipname.outputs.name }}.zip"
          zip -r "${{ github.workspace }}/$ZIP_NAME" . \
            -x "src/*" \
            -x "node_modules/*" \
            -x "__pycache__/*" \
            -x ".git/*" \
            -x "*.zip" \
            -x ".github/*" \
            -x ".vscode/*" \
            -x "*.map"

      - name: Upload plugin zip
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.plugin }}-${{ steps.zipname.outputs.name }}
          path: ${{ github.workspace }}/${{ steps.zipname.outputs.name }}.zip
